<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot | EaseFindBooks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
  --color-bg-main: grey;
  --color-bg-glass:#B3C8CF;
  --color-text-main: #e6e6e6;
  --color-accent: #ae89fa;
  --color-accent-light:#89a8b2;
  --color-accent-dark: #8c6cd9;
  --color-navbar: rgba(35, 36, 58, 0.9);
  --color-navbar-border: rgba(255, 255, 255, 0.1);
  --color-card-hover: rgba(170, 172, 218, 0.7);
  --color-glass-border: #3a4044;
  --color-glass-shadow: rgba(58, 61, 65, 0.1);
  --color-glass-text: rgba(230, 230, 230, 0.9);
}
body {
  background: rgba(230, 230, 230, 0.9);
  color: var(--color-text-main);
  background-image: linear-gradient(135deg, #9FB3DF 0%, #BDDDE4 40%, #9EC6F3 100%);
  background-blend-mode: overlay;
}
.glass,
.section-box,
.login-box,
.chatbot-box {
  background: var(--color-bg-glass);
  color: var(--color-text-main);
  border: 1px solid var(--color-glass-border);
  box-shadow: 0 8px 32px 0 var(--color-glass-shadow);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.navbar, .sidebar-custom {
  background: var(--color-navbar) !important;
  color: var(--color-text-main);
  border-bottom: 2px solid var(--color-navbar-border);
}
.navbar .nav-link, .navbar-brand, .sidebar-custom .nav-link {
  color: #fff !important;
}
.navbar .nav-link.active, .navbar .nav-link:hover,
.sidebar-custom .nav-link.active, .sidebar-custom .nav-link:hover {
  color: var(--color-accent) !important;
  background: var(--color-card-hover);
}
.card, .playlist-card {
  background: var(--color-accent-light) !important;
  color: #fff !important;
  border: 3px solid var(--color-glass-border) !important;
}
.card-title, .section-title, h2 {
  color: #fff;
}
.card-text {
  color: whitesmoke;
}
.btn-outline-primary {
  color: whitesmoke;
  border-color: var(--color-accent) !important;
  background: var(--color-bg-glass);
}
.btn-outline-primary:hover, .btn-outline-primary:focus {
  background: var(--color-accent) !important;
  color: #fff !important;
  border-color: var(--color-accent) !important;
}
.btn-outline-secondary {
  color: var(--color-accent-light) !important;
  border-color: var(--color-accent-light) !important;
  background: transparent !important;
}
.btn-outline-secondary:hover, .btn-outline-secondary:focus {
  background: var(--color-accent-light) !important;
  color: var(--color-bg-main) !important;
  border-color: var(--color-accent-light) !important;
}
input, textarea, select {
  background: #fff !important;
  color: #000 !important;
  border: 1px solid #444 !important;
}
::-webkit-scrollbar-thumb {
  background: var(--color-accent);
}
    .chatbot-container {
      max-width: 480px;
      margin: 60px auto 0 auto;
      background: var(--color-bg-glass);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--color-glass-border);
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 600px;
      color: var(--color-text-main);
    }
    .chat-header {
      background: var(--color-navbar);
      color: #fff;
      padding: 18px 0;
      font-size: 1.4rem;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--color-glass-border);
    }
    .chat-box {
      flex-grow: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
    }
    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      position: relative;
      animation: fadeIn 0.25s ease-in;
      word-wrap: break-word;
      font-size: 1rem;
      background: rgba(255,255,255,0.10);
      color: #fff;
      box-shadow: 0 2px 8px rgba(20,22,25,0.07);
    }
    .message.user {
      align-self: flex-end;
      background: var(--color-navbar);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.18);
      color: var(--color-navbar);
      border-bottom-left-radius: 4px;
      padding-left: 38px;
      position: relative;
    }
    .message.bot::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 16px;
      width: 18px;
      height: 18px;
      background: url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/robot.svg') no-repeat center center/contain;
      background-image: url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book.svg');
      opacity: 0.7;
    }
    .chat-input-area {
      display: flex;
      padding: 16px;
      border-top: 1px solid var(--color-glass-border);
      background: rgba(44,46,58,0.90);
    }
    .chat-input-area input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 24px;
      font-size: 1rem;
      background: rgba(255,255,255,0.10);
      color: #fff;
      outline: none;
      margin-right: 10px;
    }
    .chat-input-area input[type="text"]:focus {
      background: #23243a;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(10,33,192,0.15);
    }
    .chat-input-area button {
      padding: 0 18px;
      border: none;
      background: var(--color-navbar);
      color: #fff;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      height: 48px;
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-input-area button:hover {
      background: var(--color-accent-dark);
      color: #fff;
    }
    .chat-input-area{
      color:var(--color-glass-border)
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .chat-box::-webkit-scrollbar {
      width: 6px;
    }
    .chat-box::-webkit-scrollbar-thumb {
      background: var(--color-card-hover);
      border-radius: 3px;
    }
    @media (max-width: 600px) {
      .chatbot-container {
        max-width: 98vw;
        min-height: 80vh;
      }
      .chat-header {
        font-size: 1.1rem;
        padding: 12px 0;
      }
      .chat-input-area {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" >
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><i class="bi bi-book-half"></i> EaseFindBooks</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door-fill"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/recommend">FindBook</a></li>
          <li class="nav-item"><a class="nav-link" href="/select_mood">GetByMood</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="/chatbot">Chatbot</a></li>
          {% if session.name %}
            <li class="nav-item ms-3">
              <a class="nav-link" href="/profile" title="Profile" style="padding-top: 2px;">
                <i class="bi bi-person-circle" style="font-size: 2rem; vertical-align: middle;"></i>
              </a>
            </li>
          {% else %}
            <li class="nav-item ms-3">
              <a class="nav-link" href="/login" style="font-size: 1.15rem; font-weight: 600; border-left: 2px solid #ae89fa; margin-left: 10px; padding-left: 18px;">
                Login
              </a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <div class="chatbot-container glass mt-4">
    <div class="chat-header"><i class="bi bi-robot"></i> BookBot</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-area">
      <input type="text" id="user-input" placeholder="Ask about a book..." autocomplete="off" />
      <button onclick="handleUserInput()" title="Send"><i class="bi bi-send"></i></button>
    </div>
  </div>
  <script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');

    function appendMessage(sender, message) {
      const div = document.createElement('div');
      div.classList.add('message', sender === "user" ? "user" : "bot");
      div.innerHTML = message;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleUserInput() {
      const bookTitle = input.value.trim();
      if (!bookTitle) return;

      appendMessage("user", bookTitle);
      input.value = "";

      appendMessage("bot", "<span style='color:#3c009d'><i class='bi bi-search'></i> Searching for the exact book...</span>");

      try {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:"${encodeURIComponent(bookTitle)}"`);
        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          appendMessage("bot", `<span style='color:#b02a37'><i class='bi bi-x-circle'></i> No books found with the title "<strong>${bookTitle}</strong>".</span>`);
          return;
        }

        // Find an exact match (case-insensitive)
        const exactMatch = data.items.find(item =>
          item.volumeInfo.title.toLowerCase() === bookTitle.toLowerCase()
        );

        if (!exactMatch) {
          appendMessage("bot", `<span style='color:#b02a37'><i class='bi bi-x-circle'></i> No exact match found for "<strong>${bookTitle}</strong>".</span>`);
          return;
        }

        const book = exactMatch.volumeInfo;
        const author = book.authors?.join(", ") || "Unknown Author";
        const summary = cleanAndTrimSummary(book.description || "");

        const response = `
          <strong>${book.title}</strong><br>
          <em>by ${author}</em><br><br>
          <strong>Summary:</strong><br>${summary}
        `;

        appendMessage("bot", response);
      } catch (error) {
        console.error(error);
        appendMessage("bot", "<span style='color:#b02a37'><i class='bi bi-exclamation-triangle'></i> Something went wrong while fetching the book.</span>");
      }
    }

    function truncateText(text, maxLength) {
      return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
    }

    function cleanAndTrimSummary(description) {
      if (!description) return "No summary available.";
      const cleaned = description
        .replace(/(In this book[^.]*\.)/gi, "")
        .replace(/(This book|This edition|Written by)[^.]*\./gi, "")
        .replace(/\s+/g, ' ')
        .trim();
      return truncateText(cleaned, 400);
    }

    // Allow pressing Enter to send
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        handleUserInput();
      }
    });
  </script>
</body>
</html>
